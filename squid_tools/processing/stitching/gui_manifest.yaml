name: Stitcher
source_repo: https://github.com/Cephla-Lab/image-stitcher
source_gui: image_stitcher/stitcher_gui.py
notes: |
  Pairwise registration with phase cross-correlation, global least-squares
  optimization. Defaults tuned for Cephla's 10x / 0.752 µm pixel size.

parameters:
  pixel_size_um:
    default: 0.752
    visible: true
    tooltip: "Native pixel size in micrometers (from objective)."
    min: 0.01
    max: 100.0
    step: 0.01
